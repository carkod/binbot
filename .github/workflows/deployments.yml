name: Deployments
on:
  pull_request:
  workflow_dispatch:
env:
  ACTIONS_RUNNER_DEBUG: false
  SECRET_KEY: test
  ENV: ci
  FRONTEND_DOMAIN: http://localhost
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "postgres"

jobs:
  deploy_api:
    name: API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Build image
        run: |
          docker build -t carloswufei/binbot:${{ github.sha }} -t carloswufei/binbot:latest -f api/Dockerfile .
      - name: Run docker container
        run: |
          docker run --network host \
            -e ENV=${{ env.ENV }} \
            -e POSTGRES_PORT=${{ job.services.postgres.ports['5432'] }} \
            --name app -d carloswufei/binbot:${{ github.sha }}

      - name: Test back-end
        run: curl --retry 3 --retry-connrefused --retry-delay 10 --retry-max-time 60 --url http://localhost:8000
      - name: Push to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push carloswufei/binbot:${{ github.sha }}
          docker push carloswufei/binbot:latest

  deploy_terminal:
    name: Terminal
    runs-on: ubuntu-latest
    services:
      nginx:
        image: nginx:alpine
        ports:
          - 80:80
        options: >-
          --health-cmd "curl -f http://localhost || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Build image
        run: |
          docker build -t carloswufei/binbot_nginx:${{ github.sha }} -t carloswufei/binbot_nginx:latest .

      - name: Test front-end
        run: curl --retry 3 --retry-connrefused --retry-delay 10 --retry-max-time 60 --url http://localhost
      - name: Push to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push carloswufei/binbot_nginx:${{ github.sha }}
          docker push carloswufei/binbot_nginx:latest

  deploy_streaming:
    name: Streaming
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Build image
        run: |
          docker build -t carloswufei/binbot_streaming:${{ github.sha }} -t carloswufei/binbot_streaming:latest -f streaming/Dockerfile .
      - name: Test run script
        run: |
          docker run --network host --name binbot_streaming \
          -e PYTHONUNBUFFERED=TRUE \
          -e ENV=${{ env.ENV }} -d carloswufei/binbot_streaming:${{ github.sha }}

      - name: Push to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push carloswufei/binbot_streaming:${{ github.sha }}
          docker push carloswufei/binbot_streaming:latest

  deploy_cronjobs:
    name: Cronjobs
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Build image
        run: |
          docker build -t carloswufei/binbot_cronjobs:${{ github.sha }} -t carloswufei/binbot_cronjobs:latest -f cronjobs/Dockerfile .
      - name: Test run script
        run: |
          docker run --network host --name binbot_cronjobs \
          -e PYTHONUNBUFFERED=TRUE \
          -e ENV=${{ env.ENV }} -d carloswufei/binbot_cronjobs:${{ github.sha }}

      - name: Push to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push carloswufei/binbot_cronjobs:${{ github.sha }}
          docker push carloswufei/binbot_cronjobs:latest

  staging_deploy:
    name: Deploy to Staging (home server)
    needs:
      - deploy_api
      - deploy_terminal
      - deploy_streaming
      - deploy_cronjobs
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.actor != 'dependabot[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.STAGING_DEPLOY }}" > ~/.ssh/home_server_key
          chmod 600 ~/.ssh/home_server_key

          ssh-keyscan -p 2222 100.64.83.67 >> ~/.ssh/known_hosts

      - name: Deploy stack
        run: |
          ssh -i ~/.ssh/home_server_key \
            -p 2222 \
            "carkod@100.64.83.67" \
            'cd /var/www/terminal.binbot.in && docker compose up --pull always -d && docker image prune -f'
